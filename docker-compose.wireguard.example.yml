# Optional WireGuard sidecar overlay.
# Usage:
#   cp docker-compose.wireguard.example.yml docker-compose.wireguard.yml
#   docker compose -f docker-compose.yml -f docker-compose.wireguard.yml up -d
#
# The sidecar reads wireguard/server.conf (generated by scripts/wg-gen.sh)
# and exposes UDP ${WG_SERVER_PORT:-51820} on the host. All other range
# ports stay parameterized by ${BIND_ADDR} in docker-compose.yml.
#
# Host-level WireGuard (see docs/WIREGUARD-SETUP.md, Mode A) is simpler;
# use this overlay only if you cannot configure the host.

services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: viceroy-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./wireguard/server.conf:/config/wg0.conf:ro
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WG_SERVER_PORT:-51820}:51820/udp"
    networks:
      - attack-net
