  # === SCENARIO ENGINE ===
  scenario:
    build:
      context: .
      dockerfile: docker/Dockerfile.scenario
    container_name: mantis-scenario
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - SCENARIO_PATH=/etc/mantis/scenario.json
    volumes:
      - ./scenario/scenarios/standard.json:/etc/mantis/scenario.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      mantis-swarm:
        ipv4_address: 172.20.10.1
    depends_on:
      - sensor-1
      - sensor-2
      - sensor-3
      - sensor-4
      - sensor-5
      - sensor-6

  # === SCOREBOARD ===
  scoreboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.scoreboard
    container_name: mantis-scoreboard
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - SCENARIO_ADDR=http://172.20.10.1:9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${SCOREBOARD_PORT:-8080}:8080"
    networks:
      mantis-swarm:
        ipv4_address: 172.20.10.2

  # === ATTACK STATION ===
  attack-station:
    build:
      context: .
      dockerfile: docker/Dockerfile.attack
    container_name: mantis-attack-station
    restart: unless-stopped
    mem_limit: 512m
    cpus: 2
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${SSH_HOST_PORT:-2222}:22"
    volumes:
      - attack-home:/home
      - attack-workspace:/workspace
      - ./keys:/keys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      attack-net:
        ipv4_address: 172.21.0.100
    # NOTE: attack-station is intentionally NOT on mantis-swarm network.
    # Teams MUST pivot through a compromised boomer Sliver session to reach
    # the 172.20.x.x swarm. This matches the real competition's network isolation.

volumes:
  # Sensor data volumes (SQLite tracks)
  sensor1-data:
  sensor2-data:
  sensor3-data:
  sensor4-data:
  sensor5-data:
  sensor6-data:
  # Attack station
  attack-home:
  attack-workspace:
