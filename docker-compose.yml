networks:
  mantis-swarm:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  attack-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

x-node-defaults: &node-defaults
  build:
    context: .
    dockerfile: docker/Dockerfile.node
  restart: on-failure
  init: true
  mem_limit: 128m
  cpus: 0.5
  tmpfs:
    - /run:size=32M,exec
    - /tmp:size=50M,exec
  read_only: true
  networks:
    - mantis-swarm

services:
  # === CONTROLLERS ===
  controller-1:
    <<: *node-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      target: controller
    container_name: mantis-controller-1
    environment:
      - CONTROLLER_CONFIG_PATH=/etc/controller/config.yaml
    volumes:
      - ./configs/controller-1/config.yaml:/etc/controller/config.yaml:ro
      - ./configs/controller-1/key.pem:/etc/controller/key.pem:ro
    networks:
      mantis-swarm:
        ipv4_address: 172.20.1.1
      attack-net:
        ipv4_address: 172.21.0.201

  controller-2:
