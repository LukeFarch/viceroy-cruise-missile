# Swarm 2 overlay for Gilded Guardian CTF practice range.
# Usage: docker compose -f docker-compose.yml -f docker-compose.swarm2.yml up -d

networks:
  mantis-swarm-2:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
  attack-net:
    # Defined in base docker-compose.yml; redeclared here so Compose
    # merges rather than errors.  No ipam override needed.
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

x-node-defaults-s2: &node-defaults-s2
  build:
    context: .
    dockerfile: docker/Dockerfile.node
  restart: on-failure
  init: true
  mem_limit: 128m
  cpus: 0.5
  tmpfs:
    - /run:size=32M,exec
    - /tmp:size=50M,exec
  read_only: true
  networks:
    - mantis-swarm-2

services:
  # ==========================================================================
  #  SWARM 2 — CONTROLLERS (5)
  # ==========================================================================
  s2-controller-1:
    <<: *node-defaults-s2
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      target: controller
    container_name: mantis-s2-controller-1
    environment:
      - CONTROLLER_CONFIG_PATH=/etc/controller/config.yaml
    volumes:
      - ./configs-s2/s2-controller-1/config.yaml:/etc/controller/config.yaml:ro
      - ./configs-s2/s2-controller-1/key.pem:/etc/controller/key.pem:ro
    networks:
      mantis-swarm-2:
        ipv4_address: 172.22.1.1
      attack-net:
        ipv4_address: 172.21.0.206

