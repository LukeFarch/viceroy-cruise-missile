    volumes:
      - ./scenario/scenarios/s2-standard.json:/etc/mantis/scenario.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      mantis-swarm-2:
        ipv4_address: 172.22.10.1
